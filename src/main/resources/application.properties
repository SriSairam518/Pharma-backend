# ================================================================
# application.properties
#
# This file configures your entire Spring Boot application.
# Spring reads this file on startup.
# ================================================================

# ===== Server =====
# Port your backend runs on (default is 8080, keep it)
server.port=${PORT:8081}

# Prefix for all API routes — matches your React api.js BASE_URL
server.servlet.context-path=/


spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Show SQL queries in the console (useful while learning)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=create

# ---- FILE UPLOADS ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---- JACKSON (JSON) ----
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ---- LOGGING ----
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.pharma=INFO
logging.level.org.hibernate.orm.jdbc.bind=off

# ---- APP NAME ----
spring.application.name=pharma-backend

mistral.api.key=${MISTRAL_API_KEY}
mistral.api.url=${MISTRAL_API_URL}

# Cloudinary (image storage)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

frontend.url=${FRONTEND_URL}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}