# ===== Server =====
# Port your backend runs on (default is 8080, keep it)
server.port=${PORT:8081}

# Prefix for all API routes — matches your React api.js BASE_URL
server.servlet.context-path=/

# Show SQL queries in the console (useful while learning)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

spring.h2.console.enabled=false

# ---- FILE UPLOADS ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---- JACKSON (JSON) ----
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ---- LOGGING ----
logging.level.root=WARN
logging.level.com.pharma=INFO
logging.level.org.springframework=WARN

logging.level.org.hibernate=ERROR
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.type=OFF
logging.level.org.hibernate.type.descriptor.sql=

logging.level.org.springframework.security=ERROR

logging.level.org.springframework.web=WARN
logging.level.org.springframework.boot=WARN

logging.level.org.springframework.boot.context.config=TRACE

# ---- APP NAME ----
spring.application.name=pharma-backend

mistral.api.key=${MISTRAL_API_KEY}
mistral.api.url=${MISTRAL_API_URL}

# Cloudinary (image storage)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

frontend.url=${FRONTEND_URL}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool — keep small on free tier
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ---- SPRING SECURITY + JWT ----
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

# ---- ADMIN ACCOUNT (created once on first startup) ----
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}
admin.email=${ADMIN_EMAIL}

# ---- GMAIL SMTP ----
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ---- GZIP COMPRESSION ----
# Compresses API responses before sending to the browser.
# Reduces response size by ~70% — a 50KB JSON becomes ~15KB.
# Makes a noticeable difference on slow mobile connections.
# threshold=1024 means: only compress responses larger than 1KB
# (no point compressing tiny responses — compression has overhead)
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024